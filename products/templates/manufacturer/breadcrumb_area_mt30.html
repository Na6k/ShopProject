<div class="breadcrumb-area mt-30">

        <div class="breadcrumb">
            <ul class="d-flex align-items-center">
                <li><a href="{% url 'home_page' %}">Главная</a></li>
                {% for name in category %}

            </ul>
        </div>
    </div>
</div>
